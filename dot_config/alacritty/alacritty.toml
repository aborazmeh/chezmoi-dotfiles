[[keyboard.bindings]]
chars = """

"""
key = "NumpadEnter"

[mouse]
hide_when_typing = false

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[terminal.shell]
args = ["new-session", "-A", "-D", "-s", "main"]
program = "/usr/bin/tmux"
#   - (macOS) /bin/bash --login
#   - (Linux) user login shell
#   - (Windows) powershell

[bell]
# Values for `animation`:
#   - Ease
#   - EaseOut
#   - EaseOutSine
#   - EaseOutQuad
#   - EaseOutCubic
#   - EaseOutQuart
#   - EaseOutQuint
#   - EaseOutExpo
#   - EaseOutCirc
#   - Linear
# Specifying a `duration` of `0` will disable the visual bell.
animation = "EaseOutExpo"
color = "0xffffff"
duration = 0

[window]
dynamic_title = true
class = "Alacritty"
decorations = "none"
dynamic_padding = false
startup_mode = "Windowed" # Values for `startup_mode`: Windowed, Maximized, Fullscreen
title = "Alacritty"

[window.dimensions]
# opacity: 0.9
columns = 0
lines = 0

[window.padding]
x = 0
y = 0
