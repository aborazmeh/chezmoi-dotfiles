default_install_hook_types: ["pre-commit", "commit-msg"]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      # - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: pretty-format-json
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py310-plus"]

  - repo: https://github.com/sirosen/slyp
    rev: 0.9.0
    hooks:
      - id: slyp

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix, --select=I]
        types_or: [python, pyi, jupyter, pyproject]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/crate-ci/committed
    rev: v1.1.11
    hooks:
      - id: committed

  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
      - id: check-readthedocs
      - id: check-metaschema
        name: Validate Vendored Schemas
        files: ^src/check_jsonschema/builtin_schemas/vendor/.*\.json$
        exclude: ^src/check_jsonschema/builtin_schemas/vendor/azure-pipelines\.json$
      - id: check-metaschema
        name: Validate Vendored Schemas (nonunicode regexes)
        files: ^src/check_jsonschema/builtin_schemas/vendor/azure-pipelines\.json$
        args: ["--regex-variant", "nonunicode"]
      - id: check-jsonschema
        name: Validate Test Configs
        args: ["--schemafile", "tests/example-files/config_schema.json"]
        files: ^tests/example-files/.*/_config.yaml$

  - repo: https://github.com/google/yamlfmt
    rev: v0.19.0
    hooks:
      - id: yamlfmt

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/checkmake/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
